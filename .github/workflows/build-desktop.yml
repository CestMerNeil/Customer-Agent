name: Build Desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub Release tag to publish when release=true"
        required: false
      release:
        description: "Publish artifacts to GitHub Releases after gates pass"
        required: false
        default: "false"
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            os: macos-latest
            package-command: pnpm --filter @customer-agent/desktop package:mac:ci
            artifact-name: customer-agent-macos
            artifact-path: apps/desktop/release/*
          - platform: win32-x64
            os: windows-latest
            package-command: pnpm --filter @customer-agent/desktop package:win:ci
            artifact-name: customer-agent-windows
            artifact-path: apps/desktop/release/*

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Secret leak scan
        run: pnpm security:leak-scan

      - name: Local model manifest
        run: pnpm local-model:validate

      - name: Acceptance release gate
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [[ -z "$tag" ]]; then
            tag="${{ github.ref_name }}"
          fi
          pnpm release:gate -- --platform "${{ matrix.platform }}" --tag "$tag" --release-commit "${{ github.sha }}" --allow-ancestor-commit

      - name: Package desktop app
        run: ${{ matrix.package-command }}

      - name: Packaged runtime smoke
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            resources_path="$(find apps/desktop/release -path "*.app/Contents/Resources" -type d | head -n 1)"
          else
            resources_path="$(find apps/desktop/release -path "*/resources" -type d | head -n 1)"
          fi
          if [[ -z "$resources_path" ]]; then
            echo "Unable to locate packaged resources path" >&2
            exit 1
          fi
          APP_PACKAGED=true RESOURCES_PATH="$resources_path" pnpm --filter @customer-agent/desktop smoke:runtime:packaged

      - name: Generate checksums
        shell: bash
        run: |
          cd apps/desktop/release
          shasum -a 256 * > "checksums-${{ matrix.platform }}.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [[ -z "$tag" ]]; then
            tag="${{ github.ref_name }}"
          fi
          if [[ -z "$tag" ]]; then
            echo "Release tag is required" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: dist-artifacts/**
          generate_release_notes: true
          fail_on_unmatched_files: true
